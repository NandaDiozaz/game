<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Dodge - Global Universe</title>
    <style>
        :root {
            --bg-color: #05050a;
            --primary: #00f2ff;
            --text: #ffffff;
            --glass: rgba(0, 0, 0, 0.9);
            --gold: #ffd700;
            --success: #00ff88;
            --danger: #ff4444;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden;
            touch-action: none;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; background: #000; }
        canvas { display: block; }

        /* HUD */
        #hud {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between;
            pointer-events: none; z-index: 10;
        }

        #score-box {
            font-size: 1.4rem; font-weight: bold; color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        #ammo-box {
            font-size: 1rem; font-weight: bold; color: var(--gold);
            margin-top: 5px;
            background: rgba(255, 215, 0, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        #mini-leaderboard {
            width: 280px; 
            max-height: 40vh; 
            background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px; padding: 12px;
            backdrop-filter: blur(15px); font-size: 0.85rem;
            overflow-y: auto; pointer-events: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .lb-title {
            text-align: center; font-weight: bold; color: var(--primary);
            margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px;
        }

        .lb-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 5px 0; 
            padding: 4px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .lb-row.highlight { color: #ffcc00; font-weight: bold; }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }

        .modal {
            background: #111a2e; padding: 25px; border-radius: 15px;
            border: 2px solid var(--primary); 
            width: 90%; max-width: 450px;
            text-align: center; position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            max-height: 90vh; overflow-y: auto;
        }

        .close-btn { position: absolute; top: 5px; right: 15px; font-size: 1.8rem; color: #666; cursor: pointer; }
        
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #000; border: 1px solid var(--primary);
            color: white; border-radius: 8px; text-align: center; box-sizing: border-box;
        }

        .main-btn {
            background: var(--primary); color: #000; border: none;
            padding: 12px 20px; border-radius: 25px; font-weight: bold;
            cursor: pointer; width: 100%; transition: 0.3s;
            margin-top: 10px; text-transform: uppercase;
        }

        .btn-gold { background: var(--gold); }
        .btn-danger { background: var(--danger); color: white; padding: 6px 12px; width: auto; font-size: 0.75rem; border-radius: 6px; margin: 0; cursor: pointer; border: none; font-weight: bold;}
        .btn-danger:hover { opacity: 0.8; transform: scale(1.05); }

        /* Floating Start Button */
        #floating-start-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 5; padding: 15px 40px; border-radius: 30px;
            background: var(--primary); color: #000; border: none;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 0 20px var(--primary);
        }

        .hidden { display: none !important; }
        label { display: block; text-align: left; font-size: 0.7rem; color: var(--primary); margin-top: 8px; }

        .admin-score-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border-bottom: 1px solid #333; 
            font-size: 0.9rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop hidden>
        <source src="https://github.com/NandaDiozaz/game/raw/refs/heads/main/game.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <div id="hud">
            <div>
                <div id="score-box">Skor: <span id="current-score">0</span></div>
                <div id="ammo-box" class="hidden">Peluru: <span id="ammo-count">0</span></div>
            </div>
            <div id="mini-leaderboard">
                <div class="lb-title">TOP GLOBAL</div>
                <div id="lb-content">hmm..</div>
            </div>
        </div>

        <button id="floating-start-btn">MULAI MISI</button>

        <!-- Layar Utama Input Nama -->
        <div id="overlay-main" class="overlay">
            <div class="modal">
                <span class="close-btn" id="close-modal">&times;</span>
                <h2 id="modal-title" style="margin: 0; color: var(--primary)">galaDxGRy</h2>
                <p id="death-stat" class="hidden" style="color: #aaa; font-size: 0.9rem; margin-top: 5px;"></p>
                <input type="text" id="name-input" placeholder="Namamu..." maxlength="12">
                <button id="launch-btn" class="main-btn">MULAI MISI</button>
            </div>
        </div>

        <!-- Papan Selamat -->
        <div id="overlay-congrats" class="overlay hidden">
            <div class="modal" style="border-color: var(--success);">
                <h2 style="color: var(--success);">LUAR BIASA!</h2>
                <div id="display-congrats-msg" class="congrats-text" style="color: var(--success); margin: 15px 0;"></div>
                <button id="btn-congrats-close" class="main-btn">MULAI LAGI</button>
            </div>
        </div>

        <!-- Panel Admin -->
        <div id="overlay-admin" class="overlay hidden">
            <div class="modal">
                <span class="close-btn" id="close-admin">&times;</span>
                <h3 style="color: var(--gold);">Oopss?!</h3>
                
                <div id="admin-auth-section">
                    <input type="password" id="admin-pass-input" placeholder="hmm..">
                    <button id="btn-admin-login" class="main-btn">hmm</button>
                </div>

                <div id="admin-edit-section" class="hidden">
                    <div style="border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px;">
                        <label>Pesan Selamat:</label>
                        <textarea id="edit-msg-input" rows="3"></textarea>
                        <label>Skor Minimal:</label>
                        <input type="number" id="edit-min-score-input">
                        <label>Ganti Password / Cheat Code:</label>
                        <input type="password" id="edit-pass-input">
                        <button id="btn-admin-save" class="main-btn btn-gold">SIMPAN</button>
                    </div>
                    
                    <h4 style="margin: 10px 0; font-size: 0.9rem; color: var(--primary);">MODERASI SKOR</h4>
                    <div id="admin-score-list" style="max-height: 250px; overflow-y: auto; background: #000; border-radius: 8px; text-align: left;">
                    </div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";


//========================================================================================================
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyC4UpCd_ws3MaKCXySfrTScrmUeVC4Dukg",
    authDomain: "saitsisnitidy.firebaseapp.com",
    projectId: "saitsisnitidy",
    storageBucket: "saitsisnitidy.firebasestorage.app",
    messagingSenderId: "598405926452",
    appId: "1:598405926452:web:d2268d034a01b722340461",
    measurementId: "G-2D4NVBZHL4"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);



//========================================================================================================

//delete by nanda
//        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'space-dodge-global-v3';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('current-score');
        const ammoBox = document.getElementById('ammo-box');
        const ammoCount = document.getElementById('ammo-count');
        const bgAudio = document.getElementById('bg-audio');
        const floatingStartBtn = document.getElementById('floating-start-btn');
        const overlayMain = document.getElementById('overlay-main');
        const overlayCongrats = document.getElementById('overlay-congrats');
        const overlayAdmin = document.getElementById('overlay-admin');
        const nameInput = document.getElementById('name-input');
        
        let user = null, gameActive = false, score = 0, enemies = [], bullets = [], stars = [], currentPilot = "";
        let adminSettings = { message: "Selamat!", password: "asdasdasd", minScore: 20000 };
        let allGlobalScores = [];
        let ammo = 0;

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else { await signInAnonymously(auth); }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (u) { syncLeaderboard(); syncAdmin(); }
        });
        initAuth();

        function syncAdmin() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), (s) => {
                if (s.exists()) {
                    adminSettings = { ...adminSettings, ...s.data() };
                    document.getElementById('display-congrats-msg').innerHTML = linkify(adminSettings.message || "Selamat!");
                    
                    // Selalu isi input admin dengan data terbaru agar tidak kosong saat dibuka
                    document.getElementById('edit-msg-input').value = adminSettings.message;
                    document.getElementById('edit-min-score-input').value = adminSettings.minScore;
                    document.getElementById('edit-pass-input').value = adminSettings.password;
                } else { 
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), adminSettings); 
                }
            });
        }

        function syncLeaderboard() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), (snap) => {
                allGlobalScores = [];
                snap.forEach(d => { allGlobalScores.push({ docId: d.id, ...d.data() }); });
                updateLeaderboardUI();
            }, (err) => console.error(err));
        }

        function updateLeaderboardUI() {
            let validScores = [...allGlobalScores];
            if (!validScores.find(s => s.name === "DxGR")) {
                validScores.push({ name: "DxGR", score: 999999999, docId: 'legend-dxgr' });
            }
            validScores.sort((a,b) => b.score - a.score);
            const display = validScores.slice(0, 25);
            document.getElementById('lb-content').innerHTML = display.map((p, i) => `
                <div class="lb-row ${p.name === 'DxGR' ? 'highlight' : ''}">
                    <span>${i+1}. ${p.name}</span>
                    <span>${p.score.toLocaleString()}</span>
                </div>
            `).join('');
            renderAdminModeration();
        }

        function renderAdminModeration() {
            const list = document.getElementById('admin-score-list');
            const modData = allGlobalScores.filter(p => p.docId !== 'legend-dxgr');
            if (modData.length === 0) { list.innerHTML = `<div style="padding:20px; color:#666; text-align:center;">Database Kosong.</div>`; return; }
            list.innerHTML = ''; 
            modData.forEach(p => {
                const item = document.createElement('div');
                item.className = 'admin-score-item';
                item.innerHTML = `
                    <div style="flex:1; overflow:hidden; margin-right:10px;">
                        <div style="font-weight:bold; color:var(--primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${p.name}</div>
                        <div style="font-size:0.7rem; color:#888;">ID: ${p.docId} | ${p.score.toLocaleString()}</div>
                    </div>
                `;
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-danger'; delBtn.innerText = 'HAPUS';
                delBtn.onclick = async () => {
                    delBtn.innerText = "..."; delBtn.disabled = true;
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scores', p.docId)); } catch (e) { delBtn.innerText = "GAGAL"; setTimeout(() => { delBtn.innerText = "HAPUS"; delBtn.disabled = false; }, 2000); }
                };
                item.appendChild(delBtn); list.appendChild(item);
            });
        }

        // --- CHEAT / SHORTCUTS ---
        let touchSequence = [];
        window.addEventListener('touchstart', (e) => {
            const x = e.touches[0].clientX; const y = e.touches[0].clientY;
            const w = window.innerWidth; const h = window.innerHeight;
            const threshold = 80;
            let pos = "";
            if (x < threshold && y < threshold) pos = "TL";
            else if (x > w - threshold && y < threshold) pos = "TR";
            else if (x < threshold && y > h - threshold) pos = "BL";
            if (pos) {
                touchSequence.push(pos);
                const expected = ["TL", "TR", "BL"];
                const currentMatch = expected.slice(0, touchSequence.length);
                if (JSON.stringify(touchSequence) !== JSON.stringify(currentMatch)) touchSequence = [pos];
                if (touchSequence.length === 3) { overlayAdmin.classList.remove('hidden'); touchSequence = []; }
            }
        }, { passive: true });

        let keyHistory = "";
        window.addEventListener('keydown', (e) => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
            keyHistory += e.key.toLowerCase();
            if (keyHistory.length > 50) keyHistory = keyHistory.slice(-50);
            const currentSecret = (adminSettings.password || "asdasdasd").toLowerCase();
            if (keyHistory.endsWith(currentSecret)) { overlayAdmin.classList.remove('hidden'); keyHistory = ""; }
        });

        // --- LOGIKA GAME ---
        class Bullet { constructor(x,y,angle){this.x=x;this.y=y;this.v=15;this.vx=Math.cos(angle)*this.v;this.vy=Math.sin(angle)*this.v;this.r=6;} update(){this.x+=this.vx;this.y+=this.vy;} draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();}}
        class Meteor { constructor(isS=false){this.isSpecial=isS;const bS=isS?25:(Math.random()*15+12);this.r=bS+Math.min(score/5000,20);this.x=Math.random()*canvas.width;this.y=-60;this.v=(isS?4:5)+(score/2500);this.color=isS?"#ffd700":"#ff0055";} draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.color;ctx.fill();}}
        const player = { x: 0, y: 0, targetX: 0, targetY: 0, r: 16, lerp: 0.18 };
        
        function resize() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
            stars = Array.from({length: 100}, () => ({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2.5, o: Math.random()})); 
        }
        window.addEventListener('resize', resize); resize();

        const handleInput = (e) => { 
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : player.x)); 
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : player.y)); 
            player.targetX = x; player.targetY = y; 
        };
        window.addEventListener('mousemove', handleInput); 
        window.addEventListener('touchmove', e => { if(gameActive) e.preventDefault(); handleInput(e); }, {passive:false});

        function shoot() { if (ammo > 0) { const bA = -Math.PI / 2; const c = score > 10000 ? 5 : 3; for(let i=0; i<c; i++){ const a = bA - 0.25 + (i * (0.5/(c-1))); bullets.push(new Bullet(player.x, player.y - player.r, a)); } ammo--; ammoCount.innerText = ammo; if (ammo <= 0) ammoBox.classList.add('hidden'); } }
        let lastShootTime = 0;
        
        function loop(t) {
            if(!gameActive) return; ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            stars.forEach(s => { ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(t/500 + s.o)*0.5})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += 2 + (score/10000); if(s.y > canvas.height) s.y = 0; });
            player.x += (player.targetX - player.x) * player.lerp; player.y += (player.targetY - player.y) * player.lerp;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fillStyle = ammo > 0 ? "#ffd700" : "#00f2ff"; ctx.fill();
            if (ammo > 0 && t - lastShootTime > 150) { shoot(); lastShootTime = t; }
            bullets.forEach((b, bi) => { b.update(); b.draw(); if(b.y < -50 || b.x < -50 || b.x > canvas.width + 50) bullets.splice(bi, 1); });
            if(Math.random() < (0.06 + Math.min(score / 50000, 0.15))) { enemies.push(new Meteor(Math.random() < (0.08 + Math.min(score / 100000, 0.12)))); }
            enemies.forEach((m, mi) => { m.y += m.v; m.draw(); if(Math.hypot(player.x-m.x, player.y-m.y) < player.r+m.r) { if (m.isSpecial) { enemies.splice(mi, 1); ammo += 50; ammoCount.innerText = ammo; ammoBox.classList.remove('hidden'); score += 1000; scoreVal.innerText = score.toLocaleString(); } else { die(); } }
            bullets.forEach((b, bi) => { if(Math.hypot(b.x-m.x, b.y-m.y) < b.r + m.r) { if (!m.isSpecial) { enemies.splice(mi, 1); bullets.splice(bi, 1); score += 250; scoreVal.innerText = score.toLocaleString(); } else { bullets.splice(bi, 1); } } });
            if(m.y > canvas.height + 100) { enemies.splice(mi,1); score += 100; scoreVal.innerText = score.toLocaleString(); } });
            requestAnimationFrame(loop);
        }

        async function die() {
            gameActive = false; 
            document.getElementById('death-stat').innerText = `Skormu cuma: ${score.toLocaleString()}`; 
            document.getElementById('death-stat').classList.remove('hidden');
            if(score > 0 && user) { try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), { name: currentPilot, score: score, ts: Date.now() }); } catch(e) {} }
            if(score >= (adminSettings.minScore || 20000)) { overlayCongrats.classList.remove('hidden'); }
            else { 
                overlayMain.classList.remove('hidden'); 
                document.getElementById('modal-title').innerText = "Yakin cuma segitu doang?"; 
                document.getElementById('modal-title').style.color = "var(--danger)"; 
            }
            ammo = 0; ammoBox.classList.add('hidden'); 
            floatingStartBtn.classList.remove('hidden');
        }

        function backToStart() {
            gameActive = false;
            overlayCongrats.classList.add('hidden');
            overlayMain.classList.remove('hidden');
            document.getElementById('modal-title').innerText = "galaDxGRy";
            document.getElementById('modal-title').style.color = "var(--primary)";
            document.getElementById('death-stat').classList.add('hidden');
            floatingStartBtn.classList.remove('hidden');
            if (currentPilot) nameInput.value = currentPilot;
        }

        function startGame() {
            const n = nameInput.value.trim(); 
            if(!n) { overlayMain.classList.remove('hidden'); nameInput.focus(); return; }
            try { bgAudio.play(); } catch(e) {}
            currentPilot = n; score = 0; scoreVal.innerText = "0"; enemies = []; bullets = []; ammo = 0; gameActive = true;
            overlayMain.classList.add('hidden'); overlayCongrats.classList.add('hidden'); floatingStartBtn.classList.add('hidden');
            requestAnimationFrame(loop);
        }

        // --- Event Listeners ---
        floatingStartBtn.onclick = () => {
            if (currentPilot) nameInput.value = currentPilot;
            overlayMain.classList.remove('hidden');
            nameInput.focus();
        };

        document.getElementById('launch-btn').onclick = startGame;
        document.getElementById('btn-congrats-close').onclick = backToStart;

        document.getElementById('btn-admin-login').onclick = () => { 
            if (document.getElementById('admin-pass-input').value === adminSettings.password) { 
                document.getElementById('admin-auth-section').classList.add('hidden'); 
                document.getElementById('admin-edit-section').classList.remove('hidden');
                // Isi ulang input saat login sukses sebagai pencegahan
                document.getElementById('edit-msg-input').value = adminSettings.message;
                document.getElementById('edit-min-score-input').value = adminSettings.minScore;
                document.getElementById('edit-pass-input').value = adminSettings.password;
            } else alert("Akses Ditolak!"); 
        };
        
        document.getElementById('btn-admin-save').onclick = async () => { 
            const data = { 
                message: document.getElementById('edit-msg-input').value, 
                password: document.getElementById('edit-pass-input').value, 
                minScore: parseInt(document.getElementById('edit-min-score-input').value) || 20000 
            }; 
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), data); 
            overlayAdmin.classList.add('hidden'); 
            alert("Disimpan! Password baru sekarang menjadi Cheat Code Anda."); 
        };

        document.getElementById('close-admin').onclick = () => { overlayAdmin.classList.add('hidden'); document.getElementById('admin-auth-section').classList.remove('hidden'); document.getElementById('admin-edit-section').classList.add('hidden'); };
        document.getElementById('close-modal').onclick = () => overlayMain.classList.add('hidden');

        function linkify(text) { const urlRegex = /(https?:\/\/[^\s]+)/g; return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#00f2ff">${url}</a>`); }

        function idle(t) { if(!gameActive) { ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height); stars.forEach(s => { ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(t/1000 + s.o)*0.2})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += 0.5; if(s.y > canvas.height) s.y = 0; }); requestAnimationFrame(idle); } }
        requestAnimationFrame(idle);
    </script>
</body>
</html>
